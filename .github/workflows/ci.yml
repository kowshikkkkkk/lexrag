name: LexRAG CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pydantic pydantic-settings fastapi python-dotenv pypdf python-docx rank-bm25 pytest pytest-asyncio groq

      - name: Run unit tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/unit/ -v --tb=short

      - name: Check imports
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -c "from config.settings import get_settings; print('Settings OK')"
          python -c "from ingestion.loader import load_document; print('Loader OK')"
          python -c "from chunking.splitter import split_document; print('Chunker OK')"