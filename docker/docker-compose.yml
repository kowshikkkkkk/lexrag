services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: lexrag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ../data/qdrant:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:6333/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: lexrag-redis
    ports:
      - "6379:6379"
    volumes:
      - ../data/redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: lexrag-app
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ../data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    container_name: lexrag-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ../data:/data
    command: >
      mlflow server --backend-store-uri sqlite:///data/mlflow/mlflow.db --host 0.0.0.0 --port 5000

  prometheus:
    image: prom/prometheus:latest
    container_name: lexrag-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../docker/prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: lexrag-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=lexrag123
    volumes:
      - ../data/grafana:/var/lib/grafana
    depends_on:
      - prometheus
